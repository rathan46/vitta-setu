version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://vitta:secret@db:5432/vitta_setu
      - SECRET_KEY=your_production_secret_key
      - APP_DOMAIN=http://localhost
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=vitta
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=vitta_setu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
