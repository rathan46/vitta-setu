version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///data/vitta_setu.db
      - SECRET_KEY=your_production_secret_key
      - APP_DOMAIN=http://localhost
    volumes:
      - sqlite_data:/app/data
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: always

volumes:
  sqlite_data:
