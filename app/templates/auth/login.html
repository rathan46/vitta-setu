{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card-premium p-4">
            <h3 class="text-center fw-bold mb-4">Merchant Login</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-secondary">Email</label>
                    <input type="email" name="email" class="form-control" required placeholder="merchant@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary-gradient w-100 py-2">Login to Dashboard</button>
            </form>
            <div class="text-center mt-4">
                <p class="text-secondary">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-info text-decoration-none">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
