<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status - Vitta Setu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        setTimeout(() => {
            {% if session.transactions %}
            window.location.href = "{{ session.transactions[0].return_url }}";
            {% endif %}
        }, 3000);
    </script>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card-premium p-4 text-center" style="max-width: 400px; width: 100%;">
    {% if session.state == 'SUCCESS' %}
        <div class="mb-3 text-success">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <h3 class="fw-bold text-success mb-2">Payment Successful</h3>
    {% elif session.state == 'UNKNOWN' %}
        <div class="mb-3 text-warning">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        </div>
        <h3 class="fw-bold text-warning mb-2">Manual Verification</h3>
        <p class="text-secondary small">Redirecting you to merchant for UTR verification...</p>
    {% else %}
        <div class="mb-3 text-danger">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
        </div>
        <h3 class="fw-bold text-danger mb-2">Payment Failed</h3>
    {% endif %}
    <p class="text-secondary mb-0 mt-3">Redirecting to merchant...</p>
</div>

</body>
</html>
