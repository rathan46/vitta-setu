<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Expired - Vitta Setu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card-premium p-4 text-center" style="max-width: 400px; width: 100%;">
    <div class="mb-4 text-secondary">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
    </div>
    <h3 class="fw-bold mb-3 text-secondary">Session Expired</h3>
    <p class="text-secondary mb-4">This payment session has expired because it was inactive for more than 10 minutes.</p>
    {% if session.transactions %}
        <a href="{{ session.transactions[0].return_url }}" class="btn btn-secondary w-100 py-2 fw-bold">Return to Merchant</a>
    {% endif %}
</div>

</body>
</html>
