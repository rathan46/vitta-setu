<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Verification Required - Vitta Setu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card-premium p-4 text-center" style="max-width: 450px; width: 100%;">
    <div class="mb-4 text-warning">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    </div>
    
    <h3 class="fw-bold mb-3">Verification Required</h3>
    
    <p class="text-secondary mb-4">
        We could not automatically confirm your payment from the UPI application. 
        Please provide your UTR (Transaction Reference) Number for manual verification.
    </p>

    <form action="{{ tx.return_url }}" method="GET">
        <div class="mb-3 text-start">
            <label class="form-label text-secondary small">UTR Number</label>
            <input type="text" name="utr" class="form-control" placeholder="e.g. 312345678901" required>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label text-secondary small">Payment Screenshot</label>
            <input type="file" class="form-control" accept="image/*">
            <div class="form-text text-secondary small">Optional but highly recommended</div>
        </div>
        
        <input type="hidden" name="status" value="UNKNOWN">
        <input type="hidden" name="token" value="{{ session.temporary_token }}">
        
        <button type="submit" class="btn btn-warning w-100 py-2 fw-bold text-dark">Submit for Verification</button>
    </form>
</div>

</body>
</html>
